<!doctype html>
<html lang="{{ or site.Language.Locale site.Language.Lang `en` }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="site-shell">
    {{ partial "header.html" . }}
    <main id="main" class="site-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
