{{ define "main" }}
  <article class="page">
    {{ if eq .RelPermalink "/resume/" }}
      <a class="back-link" href="{{ site.Home.RelPermalink }}">&larr; Back to home</a>
    {{ end }}

    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ if and (in (slice "blog" "posts") .Section) (not .Date.IsZero) }}
        <p class="page-meta">
          <time datetime="{{ .Date.Format `2006-01-02` }}">{{ .Date.Format "2 Jan 2006" }}</time>
        </p>
      {{ end }}
      {{ with .Description }}
        <p class="page-subtitle">{{ . }}</p>
      {{ end }}
    </header>

    <div class="prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
