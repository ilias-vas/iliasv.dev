<footer class="site-footer">
    <p>&copy; {{ now.Format "2006" }} {{ site.Title }}. </p>
    {{ if or site.Params.email site.Params.github site.Params.linkedin }}
    <nav class="footer-links" aria-label="Footer links">
        {{ with site.Params.linkedin }}<a href="{{ . }}">linkedin</a>{{ end }}
        {{ with site.Params.github }}<a href="{{ . }}">github</a>{{ end }}
        {{ with site.Params.email }}<a href="mailto:{{ . }}">email</a>{{ end }}
    </nav>
    {{ end }}
</footer>
