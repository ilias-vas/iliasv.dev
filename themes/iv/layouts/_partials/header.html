<header class="site-header">
  <a class="site-title" href="{{ site.Home.RelPermalink }}">[/iliasv.dev]</a>
  {{ with site.Menus.main }}
    <nav class="site-nav" aria-label="Main navigation">
      <ul>
        {{ $currentPage := $ }}
        {{ range . }}
          <li>
            <a href="{{ .URL }}"{{ if or ($currentPage.IsMenuCurrent .Menu .) ($currentPage.HasMenuCurrent .Menu .) }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
          </li>
        {{ end }}
        <li>
          <button class="theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
            <span aria-hidden="true">[&#9728;]</span>
          </button>
        </li>
      </ul>
    </nav>
  {{ end }}
</header>
